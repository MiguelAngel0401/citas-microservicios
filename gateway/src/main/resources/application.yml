server:
  port: 8090

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: mcv-pacientes
              uri: lb://mcv-pacientes
              predicates:
                - Path=/api/pacientes/**

            - id: mcv-medicos
              uri: lb://mcv-medicos
              predicates:
                - Path=/api/medicos/**

            - id: mcv-citas
              uri: lb://mcv-citas
              predicates:
                - Path=/api/citas/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka